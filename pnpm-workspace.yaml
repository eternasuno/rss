  - '@better-auth/drizzle-adapter@1.6.21'
  - '@better-auth/kysely-adapter@1.6.21'
  - '@better-auth/memory-adapter@1.6.21'
  - '@better-auth/mongo-adapter@1.6.21'
  - '@better-auth/prisma-adapter@1.6.21'
  - '@better-auth/telemetry@1.6.21'
  - better-auth@1.6.21
